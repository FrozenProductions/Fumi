name: CI

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/ci.yml"
            - "biome.json"
            - "bun.lock"
            - "package.json"
            - "postcss.config.js"
            - "src/**"
            - "src-tauri/**"
            - "tailwind.config.js"
            - "tsconfig.json"
            - "vite.config.mts"
    pull_request:
        paths:
            - ".github/workflows/ci.yml"
            - "biome.json"
            - "bun.lock"
            - "package.json"
            - "postcss.config.js"
            - "src/**"
            - "src-tauri/**"
            - "tailwind.config.js"
            - "tsconfig.json"
            - "vite.config.mts"

jobs:
    frontend:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.10"

            - name: Restore Bun cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.bun/install/cache
                      node_modules
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Typecheck
              run: bun run typecheck

            - name: Build frontend
              run: bun run build:web

            - name: Test frontend
              run: bun run test:frontend

    native:
        runs-on: macos-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.10"

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@1.88.0

            - name: Restore Bun cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.bun/install/cache
                      node_modules
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Test backend
              run: bun run test:backend

            - name: Build Tauri app
              run: >
                  bunx tauri build
                  --config '{"bundle":{"createUpdaterArtifacts":false}}'
